{% extends "base.html" %}
{% block title %}Juegos - PIXO Therapy{% endblock %}

{% block content %}
<div class="card-header">
    <h1 style="font-size: 14px; color: var(--accent);">Catalogo de juegos</h1>
</div>

<div class="card-grid" id="games-grid">
    <p style="color:var(--ink-dim);">Cargando...</p>
</div>

<!-- Modal: Seleccionar paciente para jugar -->
<div class="modal-overlay" id="modal-play">
    <div class="modal">
        <h2>Seleccionar paciente</h2>
        <p style="color:var(--ink-dim); margin-bottom:16px;">Elige el paciente que va a jugar</p>

        <div id="patient-select-list"></div>

        <div id="sensitivity-choice" style="display:none; margin-top:16px;">
            <h3 style="font-size:9px; color:var(--accent); margin-bottom:8px;">Sensibilidad a usar</h3>
            <div id="sens-options"></div>
        </div>

        <div style="display:flex; gap:8px; justify-content:flex-end; margin-top:16px;">
            <button class="btn" onclick="closePlayModal()">Cancelar</button>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
let selectedGameId = null;

async function loadGames() {
    const games = await fetch('/api/games').then(r => r.json());
    const grid = document.getElementById('games-grid');

    if (games.length === 0) {
        grid.innerHTML = `
            <div class="card" style="text-align:center; padding:40px;">
                <p style="color:var(--ink-dim); margin-bottom:16px;">No hay juegos disponibles</p>
                <p style="color:var(--ink-dim); font-size:8px;">Usa /create-game en Claude Code para generar juegos</p>
            </div>
        `;
        return;
    }

    grid.innerHTML = games.map(g => `
        <div class="card game-card card-clickable" onclick="openPlayModal(${g.id})">
            <div class="game-type">${g.game_type}</div>
            <h3>${g.name}</h3>
            <p>${g.description || 'Sin descripcion'}</p>
            <button class="btn btn-play" style="width:100%; font-size:10px; padding:8px;">Jugar</button>
        </div>
    `).join('');
}

async function openPlayModal(gameId) {
    selectedGameId = gameId;
    document.getElementById('modal-play').classList.add('active');

    const patients = await fetch('/api/patients').then(r => r.json());
    const list = document.getElementById('patient-select-list');

    if (patients.length === 0) {
        list.innerHTML = '<p style="color:var(--ink-dim);">No hay pacientes. <a href="/patients" style="color:var(--accent-3);">Crear uno</a></p>';
        return;
    }

    list.innerHTML = patients.map(p => `
        <div class="card card-clickable" style="padding:12px; margin-bottom:8px;" onclick="selectPatient(${p.id}, '${p.name.replace(/'/g, "\\'")}')">
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <span>${p.name} ${p.age ? '(' + p.age + ')' : ''}</span>
                <span style="font-size:7px; color:var(--ink-dim);">${p.sensitivity ? '[' + p.sensitivity.join(',') + ']' : 'Sin config'}</span>
            </div>
        </div>
    `).join('');
}

async function selectPatient(patientId, patientName) {
    // Load sensitivity info
    const [sens, presets] = await Promise.all([
        fetch(`/api/patients/${patientId}/sensitivity`).then(r => r.json()),
        fetch('/api/sensitivity/presets').then(r => r.json()),
    ]);

    const choiceDiv = document.getElementById('sensitivity-choice');
    const optsDiv = document.getElementById('sens-options');
    choiceDiv.style.display = 'block';

    let html = '';

    // Current patient sensitivity
    if (sens.sensitivities) {
        html += `<div class="card card-clickable" style="padding:10px; margin-bottom:6px; border-color:var(--accent-3);" onclick="startGame(${patientId}, ${JSON.stringify(sens.sensitivities)})">
            <span style="color:var(--accent-3);">Config actual de ${patientName}</span>
            <span style="font-size:7px; color:var(--ink-dim); margin-left:8px;">[${sens.sensitivities.join(', ')}]</span>
        </div>`;
    }

    // Presets
    html += presets.map(p => `
        <div class="card card-clickable" style="padding:10px; margin-bottom:6px;" onclick="startGame(${patientId}, ${JSON.stringify(p.sensitivities)})">
            <span>${p.name}</span>
            <span style="font-size:7px; color:var(--ink-dim); margin-left:8px;">[${p.sensitivities.join(', ')}]</span>
        </div>
    `).join('');

    optsDiv.innerHTML = html;
}

async function startGame(patientId, sensitivities) {
    // Create session
    const session = await fetch('/api/sessions', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ patient_id: patientId, game_id: selectedGameId }),
    }).then(r => r.json());

    // Store sensitivity + session in URL params
    const params = new URLSearchParams({
        patient_id: patientId,
        session_id: session.id,
        sensitivity: JSON.stringify(sensitivities),
    });
    window.location.href = `/play/${selectedGameId}?${params}`;
}

function closePlayModal() {
    document.getElementById('modal-play').classList.remove('active');
    document.getElementById('sensitivity-choice').style.display = 'none';
}

loadGames();
</script>
{% endblock %}
